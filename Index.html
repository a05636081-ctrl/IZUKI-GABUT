<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes">
<title>IZUKI ELEK | IZUKI GABUT ⚡</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ===== ROOT VARIABLES ===== */
:root{
  --bg:#040610;--bg-mid:#070a18;--bg-card:#0b0f22;
  --glass:rgba(8,12,28,.88);
  --gold:#f0a500;--gold2:#ff6b35;--gold3:#ffe066;
  --glow-g:rgba(240,165,0,.38);
  --cyan:#00e5ff;--cyan2:#38f9d7;--glow-c:rgba(0,229,255,.22);
  --purple:#9b59ff;--glow-p:rgba(155,89,255,.25);
  --bd:rgba(240,165,0,.17);--bd2:rgba(0,229,255,.1);
  --text:#ecf0ff;--dim:#6a7aaa;
  --ok:#00e676;--err:#ff3d3d;
  --r:1.4rem;--rxl:2rem;--pill:40px;
  --sg:0 0 28px rgba(240,165,0,.22),0 0 70px rgba(240,165,0,.07);
  --sc:0 0 22px rgba(0,229,255,.18);
  --t:all .38s cubic-bezier(.23,1,.32,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--gold),var(--gold2));border-radius:99px}
html{scroll-behavior:smooth}
body{background:var(--bg);font-family:'Exo 2',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}

/* ===== LOADING SCREEN ===== */
#ls{
  position:fixed;inset:0;z-index:99999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transition:opacity .8s cubic-bezier(.23,1,.32,1),transform .8s cubic-bezier(.23,1,.32,1);
}
#ls.hide{opacity:0;transform:scale(1.05);pointer-events:none}

/* loading particles */
.ls-par{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.ls-p{position:absolute;border-radius:50%;animation:lsp linear infinite;opacity:0}
@keyframes lsp{
  0%{opacity:0;transform:translateY(110vh) scale(.3)}
  10%{opacity:1}90%{opacity:.5}
  100%{opacity:0;transform:translateY(-10vh) scale(1.1)}
}
.ls-orb1{position:absolute;width:550px;height:550px;
  background:radial-gradient(circle,rgba(240,165,0,.18) 0%,transparent 70%);
  border-radius:50%;top:-120px;left:-120px;animation:ob 4.5s ease-in-out infinite}
.ls-orb2{position:absolute;width:450px;height:450px;
  background:radial-gradient(circle,rgba(0,229,255,.12) 0%,transparent 70%);
  border-radius:50%;bottom:-90px;right:-90px;animation:ob 4.5s ease-in-out infinite 2.2s}
@keyframes ob{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}

.ls-icon{
  width:94px;height:94px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:26px;display:flex;align-items:center;justify-content:center;
  font-size:2.6rem;color:#000;margin:0 auto 1.4rem;
  box-shadow:0 0 55px rgba(240,165,0,.65),0 0 110px rgba(240,165,0,.22);
  animation:ibp 2.2s ease-in-out infinite;
}
@keyframes ibp{
  0%,100%{transform:scale(1);box-shadow:0 0 55px rgba(240,165,0,.65),0 0 110px rgba(240,165,0,.22)}
  50%{transform:scale(1.07);box-shadow:0 0 80px rgba(240,165,0,.95),0 0 160px rgba(240,165,0,.35)}
}
.ls-title{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1.6rem,5vw,3rem);font-weight:900;letter-spacing:5px;
  background:linear-gradient(120deg,#fff 20%,var(--gold) 55%,var(--gold2) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:tg 2.2s ease-in-out infinite;text-align:center;line-height:1.2;
}
@keyframes tg{0%,100%{filter:drop-shadow(0 0 10px rgba(240,165,0,.4))}50%{filter:drop-shadow(0 0 28px rgba(240,165,0,.85))}}
.ls-sub{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:3px;color:var(--dim);
  text-transform:uppercase;margin-top:.4rem;text-align:center}
.ls-tag{font-size:.85rem;color:var(--dim);margin-top:.9rem;text-align:center;max-width:300px;line-height:1.7}

.ls-bar-wrap{width:min(360px,80vw);margin-top:2.8rem}
.ls-bar-lbl{display:flex;justify-content:space-between;
  font-family:'JetBrains Mono',monospace;font-size:.67rem;color:var(--dim);margin-bottom:.5rem;letter-spacing:1px}
.ls-bar-bg{width:100%;height:7px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;
  border:1px solid var(--bd);position:relative}
.ls-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--gold2),var(--cyan));
  border-radius:99px;transition:width .22s ease;box-shadow:0 0 14px rgba(240,165,0,.75);position:relative}
.ls-fill::after{content:'';position:absolute;right:-3px;top:50%;transform:translateY(-50%);
  width:11px;height:11px;background:#fff;border-radius:50%;box-shadow:0 0 12px var(--gold)}
.ls-pct{text-align:center;font-family:'JetBrains Mono',monospace;font-size:1.7rem;font-weight:700;
  color:var(--gold);margin-top:.9rem;text-shadow:0 0 22px var(--glow-g)}
.ls-status{text-align:center;font-size:.7rem;color:var(--dim);margin-top:.3rem;
  font-family:'JetBrains Mono',monospace;letter-spacing:1px;min-height:1.2em}

/* ===== WELCOME POPUP ===== */
#wp{position:fixed;inset:0;background:rgba(0,0,0,.84);backdrop-filter:blur(20px);
  z-index:9000;display:flex;align-items:center;justify-content:center;padding:1rem;
  opacity:0;pointer-events:none;transition:opacity .5s ease}
#wp.on{opacity:1;pointer-events:all}
.wpc{
  background:var(--bg-card);border:1px solid rgba(240,165,0,.42);border-radius:2.2rem;
  max-width:500px;width:100%;padding:2.6rem 2.2rem;text-align:center;
  position:relative;overflow:hidden;
  box-shadow:var(--sg),0 50px 100px rgba(0,0,0,.8);
  animation:wpin .55s cubic-bezier(.34,1.56,.64,1);
}
@keyframes wpin{from{opacity:0;transform:scale(.72) translateY(35px)}to{opacity:1;transform:scale(1) translateY(0)}}
.wp-stripe{position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--gold),var(--gold2),var(--cyan),var(--purple),var(--gold));
  background-size:250% 100%;animation:sm 2.5s linear infinite}
@keyframes sm{0%{background-position:0% 0%}100%{background-position:250% 0%}}
.wp-emo{font-size:2.8rem;margin-bottom:1rem;display:block;animation:ew 1.6s ease-in-out infinite}
@keyframes ew{0%,100%{transform:scale(1) rotate(0)}25%{transform:scale(1.25) rotate(-6deg)}75%{transform:scale(1.1) rotate(6deg)}}
.wp-title{font-family:'Orbitron',sans-serif;font-size:clamp(1rem,4vw,1.45rem);font-weight:900;
  letter-spacing:2px;background:linear-gradient(120deg,#fff,var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:1.1rem;line-height:1.35}
.wp-body{font-size:.9rem;color:var(--dim);line-height:1.85;margin-bottom:1.4rem}
.wp-body strong{color:var(--text)}
.wp-tg{display:inline-flex;align-items:center;gap:6px;background:rgba(0,136,204,.15);
  border:1px solid rgba(0,136,204,.32);padding:.3rem .9rem;border-radius:99px;
  color:#26A5E4;font-weight:700;font-size:.82rem;margin-top:.5rem;
  text-decoration:none;transition:var(--t)}
.wp-tg:hover{background:rgba(0,136,204,.3)}
.wp-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;
  padding:.9rem 2.8rem;border-radius:var(--pill);font-family:'Rajdhani',sans-serif;
  font-weight:900;font-size:1.05rem;letter-spacing:1.5px;color:#000;cursor:pointer;
  box-shadow:0 6px 28px rgba(240,165,0,.5);transition:var(--t);margin-top:.6rem;
  width:100%}
.wp-btn:hover{transform:translateY(-3px);box-shadow:0 12px 38px rgba(240,165,0,.65);filter:brightness(1.07)}
.wp-btn:active{transform:translateY(0)}

/* ===== BG ===== */
.bg-wrap{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(140px);opacity:.11;animation:of 15s ease-in-out infinite}
.bg-orb:nth-child(1){width:700px;height:700px;background:var(--gold);top:-15%;left:-18%;animation-delay:0s}
.bg-orb:nth-child(2){width:560px;height:560px;background:var(--cyan);bottom:-14%;right:-14%;animation-delay:-6s}
.bg-orb:nth-child(3){width:420px;height:420px;background:var(--purple);top:42%;left:35%;animation-delay:-3s;opacity:.07}
.bg-orb:nth-child(4){width:310px;height:310px;background:var(--gold2);top:18%;right:8%;animation-delay:-9s;opacity:.06}
@keyframes of{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(55px,-45px) scale(1.08)}
  50%{transform:translate(-22px,52px) scale(.96)}75%{transform:translate(30px,22px) scale(1.04)}}
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);
  background-size:56px 56px;animation:gd 32s linear infinite}
@keyframes gd{from{background-position:0 0}to{background-position:56px 56px}}
canvas#pc{position:fixed;inset:0;pointer-events:none;z-index:0}

/* ===== CONTAINER ===== */
.wrap{max-width:1300px;margin:0 auto;padding:1.5rem 1.2rem 3rem;
  position:relative;z-index:1;animation:pr .9s cubic-bezier(.23,1,.32,1) both}
@keyframes pr{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

/* ===== NAVBAR ===== */
.nav{
  display:flex;justify-content:space-between;align-items:center;gap:1rem;
  margin-bottom:2rem;background:var(--glass);backdrop-filter:blur(26px);
  padding:.85rem 1.8rem;border-radius:var(--rxl);border:1px solid var(--bd);
  box-shadow:var(--sg),inset 0 1px 0 rgba(255,255,255,.04);
  position:sticky;top:12px;z-index:100;
}
.nav-logo{display:flex;align-items:center;gap:.7rem}
.nav-icon{
  width:44px;height:44px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:13px;display:grid;place-items:center;font-size:1.15rem;color:#000;
  box-shadow:0 0 24px rgba(240,165,0,.6);flex-shrink:0;animation:ip 3s ease-in-out infinite;
}
@keyframes ip{0%,100%{box-shadow:0 0 24px rgba(240,165,0,.6)}50%{box-shadow:0 0 44px rgba(240,165,0,.95),0 0 70px rgba(240,165,0,.32)}}
.nav-title{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:900;letter-spacing:2px;
  background:linear-gradient(120deg,#fff 30%,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.nav-sub{font-size:.6rem;color:var(--dim);letter-spacing:2.5px;text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;margin-top:-3px}
.nav-right{display:flex;gap:.45rem;align-items:center}
.ib{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.04);
  border:1px solid var(--bd);display:grid;place-items:center;
  cursor:pointer;color:var(--dim);font-size:.95rem;transition:var(--t);position:relative;flex-shrink:0}
.ib:hover{background:var(--gold);color:#000;border-color:var(--gold);
  box-shadow:0 0 24px var(--glow-g);transform:scale(1.12) rotate(-4deg)}
.ib:active{transform:scale(.95)}
.cbadge{position:absolute;top:-5px;right:-5px;width:19px;height:19px;
  background:var(--err);border-radius:50%;font-size:.62rem;font-weight:800;color:#fff;
  display:none;place-items:center;border:2px solid var(--bg);animation:pi .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes pi{from{transform:scale(0)}to{transform:scale(1)}}
.live{display:inline-flex;align-items:center;gap:5px;
  background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.25);
  padding:.2rem .6rem;border-radius:99px;font-family:'JetBrains Mono',monospace;
  font-size:.58rem;color:var(--ok);letter-spacing:1px}
.ldot{width:6px;height:6px;background:var(--ok);border-radius:50%;animation:lp 1.2s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.25}}

/* ===== SIDEBAR ===== */
#sb{position:fixed;top:0;left:-330px;width:295px;height:100%;
  background:rgba(4,6,16,.97);backdrop-filter:blur(32px);z-index:2000;
  transition:left .44s cubic-bezier(.23,1,.32,1);padding:2rem 1.5rem;
  border-right:1px solid var(--bd);box-shadow:8px 0 55px rgba(0,0,0,.75);
  display:flex;flex-direction:column;overflow-y:auto}
#sb.on{left:0}
.sb-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
.sb-logo{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;
  background:linear-gradient(120deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.sb-x{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.05);
  border:1px solid var(--bd);display:grid;place-items:center;cursor:pointer;color:var(--gold);
  font-size:.95rem;transition:var(--t)}
.sb-x:hover{background:var(--err);color:#fff;border-color:var(--err);transform:rotate(92deg)}
.sb-div{height:1px;background:linear-gradient(90deg,transparent,var(--bd),transparent);margin:.5rem 0 1rem}
.sb-lbl{font-size:.58rem;letter-spacing:3px;color:var(--dim);text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;margin-bottom:.5rem}
#sb ul{list-style:none}
#sb ul li{margin:.25rem 0}
#sb ul li a{color:var(--text);text-decoration:none;font-weight:600;font-size:.95rem;
  display:flex;align-items:center;gap:12px;padding:.7rem .9rem;border-radius:12px;
  border:1px solid transparent;transition:var(--t)}
.sbi{width:30px;height:30px;background:rgba(255,255,255,.05);border-radius:8px;
  display:grid;place-items:center;font-size:.82rem;flex-shrink:0;transition:var(--t)}
#sb ul li a:hover{background:rgba(240,165,0,.07);border-color:var(--bd);color:var(--gold);padding-left:1.2rem}
#sb ul li a:hover .sbi{background:var(--gold);color:#000}
.sb-music a{color:var(--purple) !important}
.sb-music .sbi{background:rgba(155,89,255,.15) !important;color:var(--purple) !important}
.sb-music a:hover{background:rgba(155,89,255,.1) !important;border-color:rgba(155,89,255,.3) !important;color:var(--purple) !important}
.sb-music a:hover .sbi{background:var(--purple) !important;color:#fff !important}
.sb-foot{margin-top:auto;padding-top:1.2rem;border-top:1px solid var(--bd);
  text-align:center;font-size:.67rem;color:var(--dim);font-family:'JetBrains Mono',monospace;line-height:1.9}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.74);backdrop-filter:blur(5px);
  z-index:1999;display:none;opacity:0;transition:opacity .35s}
#ov.on{display:block;opacity:1}

/* ===== MARQUEE ===== */
.mq-wrap{overflow:hidden;background:rgba(240,165,0,.05);border:1px solid var(--bd);
  border-radius:99px;padding:.42rem 0;margin-bottom:1.5rem}
.mq-track{display:flex;gap:3rem;animation:mqs 26s linear infinite;white-space:nowrap}
.mq-track span{font-family:'JetBrains Mono',monospace;font-size:.71rem;color:var(--dim);letter-spacing:1px}
.mq-track span.hl{color:var(--gold)}
@keyframes mqs{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ===== BANNER ===== */
.banner{position:relative;border-radius:var(--rxl);padding:1.85rem 2rem;
  margin-bottom:2rem;text-align:center;overflow:hidden;
  border:1px solid var(--bd);background:linear-gradient(135deg,var(--bg-card) 0%,#0d1028 100%)}
.banner::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% -20%,rgba(240,165,0,.16) 0%,transparent 68%);pointer-events:none}
.b-stripe{position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--gold),var(--gold2),var(--cyan),var(--purple),var(--gold));
  background-size:300% 100%;animation:sm 3s linear infinite}
.banner h2{font-family:'Orbitron',sans-serif;font-size:clamp(1rem,3.5vw,1.55rem);
  font-weight:700;letter-spacing:1px;margin-bottom:.6rem;position:relative}
.b-msg{display:inline-flex;align-items:center;gap:.5rem;background:rgba(0,0,0,.42);
  padding:.35rem 1.1rem;border-radius:99px;font-size:.82rem;color:var(--dim);
  margin:.5rem 0;border:1px solid var(--bd)}
.tmr{display:flex;justify-content:center;gap:.8rem;margin-top:1rem;flex-wrap:wrap}
.tb{background:rgba(0,0,0,.55);border:1px solid var(--bd);border-radius:14px;
  min-width:78px;text-align:center;padding:.65rem .8rem .5rem;position:relative;overflow:hidden}
.tb::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--glow-g),transparent)}
.tn{display:block;font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;
  color:var(--gold);line-height:1;text-shadow:0 0 24px var(--glow-g);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),color .2s}
.tn.flip{transform:scale(1.22);color:var(--gold3)}
.tl{display:block;font-size:.6rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;
  margin-top:4px;font-family:'JetBrains Mono',monospace}

/* ===== TABS ===== */
.tabs{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:2rem;
  background:var(--bg-card);padding:.5rem;border-radius:var(--rxl);border:1px solid var(--bd2)}
.tab{background:none;border:1px solid transparent;padding:.6rem 1.15rem;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.92rem;letter-spacing:.8px;
  border-radius:var(--pill);cursor:pointer;color:var(--dim);transition:var(--t);flex:1;
  min-width:90px;white-space:nowrap;position:relative;overflow:hidden}
.tab::after{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at center,rgba(240,165,0,.11),transparent 70%);
  opacity:0;transition:opacity .3s;border-radius:inherit}
.tab:hover::after{opacity:1}
.tab.on{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-weight:800;
  box-shadow:0 4px 22px rgba(240,165,0,.46),inset 0 0 0 1px rgba(255,255,255,.05)}
.tab:hover:not(.on){background:rgba(255,255,255,.05);border-color:var(--bd);color:var(--text)}

/* ===== PRODUCT LIST ===== */
.plist{display:flex;flex-direction:column;gap:.9rem}
.pitem{background:var(--bg-card);border-radius:var(--r);border:1px solid var(--bd2);
  overflow:hidden;transition:border-color .35s,box-shadow .35s,transform .35s}
.pitem:hover{border-color:rgba(240,165,0,.2);transform:translateY(-2px)}
.pitem.open{border-color:rgba(240,165,0,.4);box-shadow:var(--sg)}

.phead{display:flex;align-items:center;gap:1rem;padding:.95rem 1.1rem;
  cursor:pointer;background:rgba(255,255,255,.018);transition:background .25s;user-select:none}
.phead:hover{background:rgba(255,255,255,.04)}

.plogo-wrap{position:relative;flex-shrink:0}
.plogo{width:54px;height:54px;object-fit:cover;border-radius:12px;
  border:1px solid var(--bd);display:block;transition:border-color .3s}
.pitem.open .plogo{border-color:rgba(240,165,0,.48)}
.pring{position:absolute;inset:-4px;border-radius:16px;border:2px solid transparent;
  background:linear-gradient(var(--bg-card),var(--bg-card)) padding-box,
    linear-gradient(135deg,var(--gold),var(--cyan)) border-box;
  opacity:0;transition:opacity .35s;pointer-events:none;animation:rr 3s linear infinite}
.pitem.open .pring{opacity:1}
@keyframes rr{
  0%{background:linear-gradient(var(--bg-card),var(--bg-card)) padding-box,linear-gradient(0deg,var(--gold),var(--cyan)) border-box}
  100%{background:linear-gradient(var(--bg-card),var(--bg-card)) padding-box,linear-gradient(360deg,var(--gold),var(--cyan)) border-box}
}
.pinfo{flex:1;min-width:0}
.pname{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.15rem;letter-spacing:.8px}
.ptag{font-size:.62rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;
  font-family:'JetBrains Mono',monospace}
.pbadge{display:inline-block;font-size:.58rem;padding:2px 7px;border-radius:6px;
  margin-left:6px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;vertical-align:middle}
.badge-hot{background:rgba(255,107,53,.2);color:var(--gold2);border:1px solid rgba(255,107,53,.3)}
.badge-new{background:rgba(0,229,255,.1);color:var(--cyan);border:1px solid rgba(0,229,255,.25)}
.parr{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.04);
  border:1px solid var(--bd2);display:grid;place-items:center;color:var(--dim);
  font-size:.75rem;transition:var(--t);flex-shrink:0}
